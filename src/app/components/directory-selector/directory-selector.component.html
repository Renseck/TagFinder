<section class="directory-section">
  <div class="input-group">
    <label for="directory-input">Project Directory:</label>
    <div class="directory-picker">
      <input 
        id="directory-input" 
        type="text" 
        [value]="selectedDirectory" 
        placeholder="Select a project directory..."
        readonly
        [class.has-value]="selectedDirectory"
      />
      <div class="button-group">
        <button 
          type="button" 
          (click)="selectDirectory()" 
          [disabled]="isSelecting"
          class="browse-btn"
        >
          <mat-icon *ngIf="!isSelecting" class="browse-icon">folder</mat-icon>
          <mat-icon *ngIf="isSelecting" class="selecting-icon">autorenew</mat-icon>
          <span *ngIf="!isSelecting">Browse</span>
          <span *ngIf="isSelecting">Selecting...</span>
        </button>
        <button 
          type="button" 
          (click)="clearDirectory()" 
          *ngIf="selectedDirectory"
          class="clear-btn"
          title="Clear selection"
        >
          <mat-icon class="clear-icon">close</mat-icon>
        </button>
      </div>
    </div>
    <div class="directory-info" *ngIf="selectedDirectory">
      <small>
        <mat-icon class="info-icon">folder</mat-icon>
        {{ getDirectoryName() }}
      </small>
    </div>
    <div class="error-message" *ngIf="errorMessage">
      <small>
        <mat-icon class="error-icon">warning</mat-icon>
        {{ errorMessage }}
      </small>
    </div>
  </div>
</section>
