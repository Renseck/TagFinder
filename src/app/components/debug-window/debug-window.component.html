<div class="debug-panel" *ngIf="getAllDisplayLogs().length > 0 || showAlways">
  
  <!-- Header with Actions -->
  <app-debug-actions
    [logCount]="getAllDisplayLogs().length"
    [collapsed]="collapsed"
    [autoScroll]="autoScroll"
    [showLogLevel]="showLogLevel"
    [canExport]="getAllDisplayLogs().length > 0"
    (clearLogs)="onClearLogs()"
    (toggleCollapsed)="onToggleCollapsed()"
    (toggleAutoScroll)="onToggleAutoScroll()"
    (toggleShowLogLevel)="onToggleShowLogLevel()"
    (exportLogs)="onExportLogs()">
  </app-debug-actions>

  <!-- Stats Section -->
  <div class="debug-stats" *ngIf="!collapsed">
    <div class="stat-item">
      <span class="stat-label">Progress:</span>
      <span class="stat-value">{{ progressCurrent }}/{{ progressTotal }} ({{ getProgressPercentage() }}%)</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Message:</span>
      <span class="stat-value">{{ progressMessage || 'None' }}</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Loading:</span>
      <span class="stat-value">{{ loading ? 'Yes' : 'No' }}</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Action:</span>
      <span class="stat-value">{{ currentAction || 'None' }}</span>
    </div>
  </div>

  <!-- Log List -->
  <app-log-list
    [logs]="getAllDisplayLogs()"
    [showLogLevel]="showLogLevel"
    [autoScroll]="autoScroll"
    [collapsed]="collapsed">
  </app-log-list>

</div>
